{% extends "profit_base.html" %}
{% block title %}{{ '编辑' if order else '新增' }}订单 - 抖音小店利润统计{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ '编辑' if order else '新增' }}订单</h1>
<div class="bg-white rounded-xl shadow-sm border p-6 max-w-2xl">
<form method="post" action="{{ '/api/orders/' ~ order.id if order else '/api/orders' }}">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><label class="block text-sm font-medium mb-1">店铺 *</label>
<select name="shop_id" class="border rounded-lg px-3 py-2 w-full" required>
{% for s in shops %}<option value="{{ s.id }}" {{ 'selected' if order and order.shop_id == s.id }}>{{ s.name }}</option>{% endfor %}
</select></div>
<div><label class="block text-sm font-medium mb-1">订单日期 *</label>
<input type="date" name="order_date" value="{{ order.order_date if order else '' }}" class="border rounded-lg px-3 py-2 w-full" required></div>
<div><label class="block text-sm font-medium mb-1">抖音订单号 *</label>
<input type="text" name="douyin_order_no" value="{{ order.douyin_order_no if order else '' }}" class="border rounded-lg px-3 py-2 w-full" required></div>
<div><label class="block text-sm font-medium mb-1">商品名称 *</label>
<input type="text" name="product_name" value="{{ order.product_name if order else '' }}" class="border rounded-lg px-3 py-2 w-full" required></div>
<div><label class="block text-sm font-medium mb-1">抖音金额 *</label>
<input type="number" step="0.01" name="douyin_amount" value="{{ order.douyin_amount if order else '' }}" class="border rounded-lg px-3 py-2 w-full" required></div>
<div><label class="block text-sm font-medium mb-1">淘宝订单号</label>
<input type="text" name="taobao_order_no" value="{{ order.taobao_order_no if order else '' }}" class="border rounded-lg px-3 py-2 w-full"></div>
<div><label class="block text-sm font-medium mb-1">淘宝金额</label>
<input type="number" step="0.01" name="taobao_amount" value="{{ order.taobao_amount if order else 0 }}" class="border rounded-lg px-3 py-2 w-full"></div>
<div><label class="block text-sm font-medium mb-1">订单状态</label>
<select name="refund_status" class="border rounded-lg px-3 py-2 w-full">
<option value="待发货" {{ 'selected' if order and order.refund_status=='待发货' }}>待发货</option>
<option value="已发货" {{ 'selected' if order and order.refund_status=='已发货' }}>已发货</option>
<option value="已发货退款" {{ 'selected' if order and order.refund_status=='已发货退款' }}>已发货退款</option>
<option value="退货退款" {{ 'selected' if order and order.refund_status=='退货退款' }}>退货退款</option>
</select></div>
<div><label class="block text-sm font-medium mb-1">是否达人带货</label>
<select name="is_influencer" class="border rounded-lg px-3 py-2 w-full">
<option value="否" {{ 'selected' if order and order.is_influencer=='否' }}>否</option>
<option value="是" {{ 'selected' if order and order.is_influencer=='是' }}>是（佣金25%）</option>
</select></div>
<div><label class="block text-sm font-medium mb-1">仓库状态</label>
<select name="warehouse_status" class="border rounded-lg px-3 py-2 w-full">
<option value="未到仓库" {{ 'selected' if order and order.warehouse_status=='未到仓库' }}>未到仓库</option>
<option value="已到达仓库未发货" {{ 'selected' if order and order.warehouse_status=='已到达仓库未发货' }}>已到达仓库未发货</option>
<option value="已到仓库已发货" {{ 'selected' if order and order.warehouse_status=='已到仓库已发货' }}>已到仓库已发货</option>
</select></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
<div><label class="block text-sm font-medium mb-1">买家备注</label>
<input type="text" name="buyer_note" value="{{ order.buyer_note if order else '' }}" class="border rounded-lg px-3 py-2 w-full"></div>
<div><label class="block text-sm font-medium mb-1">系统备注</label>
<input type="text" name="system_note" value="{{ order.system_note if order else '' }}" class="border rounded-lg px-3 py-2 w-full"></div>
<div><label class="block text-sm font-medium mb-1">物流公司</label>
<input type="text" name="logistics_company" value="{{ order.logistics_company if order else '' }}" class="border rounded-lg px-3 py-2 w-full"></div>
<div><label class="block text-sm font-medium mb-1">物流单号</label>
<input type="text" name="logistics_no" value="{{ order.logistics_no if order else '' }}" class="border rounded-lg px-3 py-2 w-full"></div>
</div>
<div class="flex gap-4 mt-6">
<button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">{{ '保存修改' if order else '创建订单' }}</button>
<a href="/profit/orders" class="bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">取消</a>
</div></form></div>
{% endblock %}
