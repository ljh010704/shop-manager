<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}抖店数据看板{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Helvetica Neue', 'Arial', 'sans-serif'] }
        }
    }
}
</script>
<style>
* { -webkit-font-smoothing: antialiased; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; }
.card { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.06); }
.nav-active { color: #0071e3; font-weight: 600; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.pulse-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.sort-icon { opacity: 0.3; transition: opacity 0.15s; }
th:hover .sort-icon { opacity: 1; }
th.sorted .sort-icon { opacity: 1; color: #0071e3; }
.modal-overlay { animation: fadeOverlay 0.2s ease; }
@keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal-content { animation: slideUp 0.25s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { height: 6px; width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
</style>
</head>
<body class="bg-[#f5f5f7] min-h-screen text-[#1d1d1f]">
<nav class="bg-white/80 backdrop-blur-xl border-b border-black/5 sticky top-0 z-40">
<div class="max-w-[1400px] mx-auto px-6">
<div class="flex items-center h-12 space-x-6">
<a href="/" class="text-base font-semibold tracking-tight text-[#1d1d1f]">抖店看板</a>
<a href="/" class="nav-link text-sm text-[#6e6e73] hover:text-[#1d1d1f] transition-colors" data-page="index">首页</a>
<a href="/ranking" class="nav-link text-sm text-[#6e6e73] hover:text-[#1d1d1f] transition-colors" data-page="ranking">排行榜</a>
<a href="/trends" class="nav-link text-sm text-[#6e6e73] hover:text-[#1d1d1f] transition-colors" data-page="trends">趋势</a>
<a href="/alerts" class="nav-link text-sm text-[#6e6e73] hover:text-[#1d1d1f] transition-colors" data-page="alerts">预警</a>
<a href="/import" class="nav-link text-sm text-[#6e6e73] hover:text-[#1d1d1f] transition-colors" data-page="import">导入</a>
</div></div></nav>
<main class="max-w-[1400px] mx-auto px-6 py-6">
{% block content %}{% endblock %}
</main>
<script>
const path = location.pathname;
document.querySelectorAll('.nav-link').forEach(el => {
    const href = el.getAttribute('href');
    if (path === href || (href !== '/' && path.startsWith(href))) {
        el.classList.add('nav-active');
    }
});
</script>
</body>
</html>
